version: 2

models:
  - name: mart_contract_risks
    description: >
      One row per contract combining metadata, party details, and risk analysis.
      Primary table powering the analytics dashboard risk distribution chart and
      the All Contracts table. Ordered by risk_score descending.
    columns:
      - name: contract_id
        description: Unique contract identifier. Foreign key to stg_contracts.
        tests:
          - unique
          - not_null
      - name: filename
        description: Original uploaded filename.
      - name: contract_type
        description: Contract classification — NDA, SOW, or HIRING.
      - name: analyzed_date
        description: Calendar date the contract was analyzed.
      - name: party_a
        description: First contracting party as extracted by Claude.
      - name: party_b
        description: Second contracting party (counterparty).
      - name: effective_date
        description: Contract start date as extracted by Claude.
      - name: expiration_date
        description: Contract end date as extracted by Claude.
      - name: governing_law
        description: Applicable law and jurisdiction.
      - name: contract_value
        description: Total monetary value of the contract including currency.
      - name: risk_score
        description: Overall risk score from 0 (lowest) to 100 (highest).
      - name: risk_tier
        description: "Risk band: HIGH (>=70), MEDIUM (>=40), LOW (<40)."
      - name: risk_flag_count
        description: Number of risk flags identified.
      - name: missing_clause_count
        description: Number of clauses identified as missing.
      - name: summary
        description: Free-text legal summary generated by Claude.
      - name: risk_flags
        description: JSON array of risk flag descriptions.
      - name: missing_clauses
        description: JSON array of missing clause names.
      - name: source_url
        description: Optional URL linking to the original document in SharePoint or another document management system.

  - name: mart_compliance_check
    description: >
      Atos standards compliance score per contract. For each contract, every
      required clause (per approved_clauses seed) is checked against the clauses
      Claude detected. Produces a compliance percentage and a COMPLIANT /
      NEEDS REVIEW / NON-COMPLIANT status. Ordered by compliance_pct ascending
      so the least-compliant contracts appear first.
    columns:
      - name: contract_id
        description: Unique contract identifier.
        tests:
          - unique
          - not_null
      - name: filename
        description: Original uploaded filename.
      - name: contract_type
        description: Contract classification — NDA, SOW, or HIRING.
      - name: total_required_clauses
        description: Total number of clauses marked as required in the approved_clauses seed for this contract type.
      - name: clauses_present
        description: Number of required clauses detected as present in the contract.
      - name: clauses_missing
        description: Number of required clauses not found in the contract.
      - name: compliance_pct
        description: Percentage of required clauses present, rounded to one decimal place (0–100).
      - name: missing_high_risk
        description: Count of missing clauses classified as high risk in the Atos standard.
      - name: missing_medium_risk
        description: Count of missing clauses classified as medium risk in the Atos standard.
      - name: missing_low_risk
        description: Count of missing clauses classified as low risk in the Atos standard.
      - name: compliance_status
        description: "Overall status: COMPLIANT (>=90%), NEEDS REVIEW (>=70%), NON-COMPLIANT (<70%)."
        tests:
          - accepted_values:
              values: ['COMPLIANT', 'NEEDS REVIEW', 'NON-COMPLIANT']

  - name: mart_clause_coverage
    description: >
      Clause presence rates aggregated by contract type and clause type across
      the entire contract portfolio. Answers the question: "Which clauses do we
      most commonly miss?" Useful for Legal team training and template improvement.
    columns:
      - name: contract_type
        description: Contract classification — NDA, SOW, or HIRING.
      - name: clause_type
        description: Standardised clause category label.
      - name: total_occurrences
        description: Total number of contracts of this type in the portfolio.
      - name: present_count
        description: Number of contracts where this clause was found present.
      - name: missing_count
        description: Number of contracts where this clause was not found.
      - name: coverage_pct
        description: Percentage of contracts of this type that include this clause (0–100).
      - name: high_risk_count
        description: Number of contracts where this clause is absent and the clause is classified as high risk.
      - name: medium_risk_count
        description: Number of contracts where this clause is absent and the clause is classified as medium risk.

  - name: mart_counterparties
    description: >
      Summary of counterparties across the contract portfolio. Each row is one
      unique counterparty name with contract counts broken down by type.
      Useful for understanding which organisations Atos has the most active
      agreements with.
    columns:
      - name: counterparty
        description: Counterparty organisation name as extracted by Claude (party_b from analyses).
      - name: total_contracts
        description: Total number of contracts involving this counterparty.
      - name: nda_count
        description: Number of NDA contracts with this counterparty.
      - name: sow_count
        description: Number of SOW contracts with this counterparty.
      - name: hiring_count
        description: Number of Hiring contracts with this counterparty.
      - name: governing_laws
        description: Comma-separated list of distinct governing laws appearing across contracts with this counterparty.

  - name: mart_expiring_soon
    description: >
      All contracts with a parseable expiration date, enriched with flags for
      contracts expiring within 90 days and contracts already expired.
      Powers the "Expiring Soon" KPI card and table in the analytics dashboard.
    columns:
      - name: contract_id
        description: Unique contract identifier.
      - name: filename
        description: Original uploaded filename.
      - name: contract_type
        description: Contract classification — NDA, SOW, or HIRING.
      - name: party_a
        description: First contracting party.
      - name: party_b
        description: Second contracting party (counterparty).
      - name: expiration_date
        description: Expiration date as extracted by Claude (raw string).
      - name: risk_score
        description: Overall risk score from 0 to 100.
      - name: risk_tier
        description: "Risk band: HIGH, MEDIUM, or LOW."
      - name: expiration_parsed
        description: Expiration date cast to a DATE type. NULL if the raw string could not be parsed.
      - name: expiring_within_90_days
        description: Boolean — true if expiration_parsed is between today and 90 days from now.
      - name: already_expired
        description: Boolean — true if expiration_parsed is before today's date.

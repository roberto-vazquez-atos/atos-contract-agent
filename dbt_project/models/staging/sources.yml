version: 2

sources:
  - name: contract_db
    description: >
      Raw tables written by the Atos Contract Helper Agent application.
      Each record represents a contract uploaded and analyzed by Claude.
    schema: main
    tables:
      - name: raw_contracts
        description: One row per uploaded contract document.
        columns:
          - name: id
            description: Unique contract identifier (UUID5 of filename + content hash).
            tests:
              - unique
              - not_null
          - name: filename
            description: Original uploaded filename.
            tests:
              - not_null
          - name: contract_type
            description: Detected or user-selected contract type.
            tests:
              - accepted_values:
                  values: ['NDA', 'SOW', 'HIRING']
          - name: analyzed_at
            description: UTC timestamp when the contract was analyzed.
            tests:
              - not_null

      - name: raw_analyses
        description: Claude's structured analysis output for each contract.
        columns:
          - name: id
            description: Unique analysis ID.
            tests:
              - unique
              - not_null
          - name: contract_id
            description: Foreign key to raw_contracts.id.
            tests:
              - not_null
              - relationships:
                  to: source('contract_db', 'raw_contracts')
                  field: id
          - name: party_a
            description: First contracting party as extracted by Claude.
          - name: party_b
            description: Second contracting party as extracted by Claude.
          - name: effective_date
            description: Contract start or effective date as extracted by Claude (string).
          - name: expiration_date
            description: Contract end or expiration date as extracted by Claude (string).
          - name: governing_law
            description: Applicable law and jurisdiction as extracted by Claude.
          - name: contract_value
            description: Total monetary value including currency symbol as extracted by Claude.
          - name: risk_score
            description: Overall risk score from 0 (low) to 100 (high).
            tests:
              - not_null
          - name: risk_flags
            description: JSON array of risk flag descriptions identified by Claude.
          - name: missing_clauses
            description: JSON array of clause names identified as absent by Claude.
          - name: key_obligations
            description: JSON array of key obligation descriptions extracted by Claude.
          - name: summary
            description: Free-text legal summary generated by Claude.
          - name: analyzed_at
            description: UTC timestamp when the analysis was stored.

      - name: raw_clauses
        description: Individual clause assessments extracted per contract.
        columns:
          - name: id
            description: Unique clause record ID.
            tests:
              - unique
              - not_null
          - name: contract_id
            description: Foreign key to raw_contracts.id.
            tests:
              - not_null
          - name: clause_type
            description: Standardised clause category label in snake_case.
          - name: clause_text
            description: Verbatim or summarised clause text as extracted from the document.
          - name: present
            description: Boolean — true if the clause was found in the contract.
          - name: risk_level
            description: Clause-level risk assessment.
            tests:
              - accepted_values:
                  values: ['low', 'medium', 'high']

      - name: raw_audit_log
        description: Audit trail of every analysis and comparison action performed in the application.
        columns:
          - name: id
            description: Unique audit event ID.
            tests:
              - unique
              - not_null
          - name: action
            description: Type of action performed.
            tests:
              - accepted_values:
                  values: ['analyze', 'compare']
          - name: filename
            description: Filename of the contract involved in the action.
          - name: contract_type
            description: Contract type at the time the action was performed.
          - name: performed_at
            description: UTC timestamp when the action was performed.
          - name: details
            description: Additional context for the event, such as risk score or number of differences found.

version: 2

models:
  - name: stg_contracts
    description: >
      Cleaned and typed contract metadata from raw uploads.
      One row per uploaded document. Adds a computed text_length_chars field
      and casts analyzed_at to a date for downstream aggregations.
    columns:
      - name: contract_id
        description: Surrogate key — UUID5 of filename + first 200 characters of content. Deterministic so re-uploading the same file produces the same ID.
        tests:
          - unique
          - not_null
      - name: filename
        description: Original filename of the uploaded Word document.
        tests:
          - not_null
      - name: contract_type
        description: Contract classification — NDA, SOW, or HIRING. Auto-detected by the app or overridden by the user at upload time.
        tests:
          - not_null
          - accepted_values:
              values: ['NDA', 'SOW', 'HIRING']
      - name: file_size_bytes
        description: Size of the raw extracted text in bytes (not the original .docx file size).
      - name: analyzed_at
        description: UTC timestamp when Claude completed the analysis.
      - name: text_length_chars
        description: Character count of the full extracted contract text. Useful as a proxy for document length.
      - name: analyzed_date
        description: Calendar date portion of analyzed_at. Used for date-level aggregations and expiry calculations.

  - name: stg_analyses
    description: >
      Structured output from Claude's contract analysis, with computed risk tier
      and counts of risk flags, missing clauses, and obligations parsed from JSON.
      One row per contract (matches stg_contracts 1:1 after deduplication).
    columns:
      - name: analysis_id
        description: Unique identifier for the analysis record (UUID4).
        tests:
          - unique
          - not_null
      - name: contract_id
        description: Foreign key to stg_contracts.contract_id.
        tests:
          - not_null
      - name: party_a
        description: First contracting party as extracted by Claude (typically Atos or the service provider).
      - name: party_b
        description: Second contracting party as extracted by Claude (typically the client or counterparty).
      - name: effective_date
        description: Contract start or effective date as extracted by Claude. Stored as a string; may be unparseable for some contracts.
      - name: expiration_date
        description: Contract end or expiration date as extracted by Claude. Used by mart_expiring_soon for 90-day alerts.
      - name: governing_law
        description: Jurisdiction and applicable law as extracted by Claude (e.g. "France", "England and Wales").
      - name: contract_value
        description: Total monetary value of the contract as extracted by Claude, including currency symbol and amount.
      - name: risk_score
        description: Overall risk score from 0 (lowest risk) to 100 (highest risk), assigned by Claude based on clause analysis.
        tests:
          - not_null
      - name: risk_tier
        description: "Risk band derived from risk_score: HIGH (>=70), MEDIUM (>=40), LOW (<40)."
        tests:
          - accepted_values:
              values: ['HIGH', 'MEDIUM', 'LOW']
      - name: risk_flag_count
        description: Number of risk flags identified by Claude, parsed from the risk_flags JSON array.
      - name: missing_clause_count
        description: Number of clauses Claude identified as missing from the contract, parsed from the missing_clauses JSON array.
      - name: obligation_count
        description: Number of key obligations extracted by Claude, parsed from the key_obligations JSON array.
      - name: summary
        description: Free-text legal summary generated by Claude for the contract.
      - name: risk_flags
        description: Raw JSON array of risk flag descriptions identified by Claude.
      - name: missing_clauses
        description: Raw JSON array of clause names Claude identified as absent from the contract.
      - name: key_obligations
        description: Raw JSON array of key obligation descriptions extracted by Claude.
      - name: analyzed_at
        description: UTC timestamp when the analysis was stored.

  - name: stg_clauses
    description: >
      Individual clause-level assessments extracted per contract.
      Each row represents one clause type evaluated for one contract.
      Includes a numeric risk_weight (1-3) to enable weighted scoring downstream.
    columns:
      - name: clause_id
        description: Unique identifier for the clause record (UUID4).
        tests:
          - unique
          - not_null
      - name: contract_id
        description: Foreign key to stg_contracts.contract_id.
        tests:
          - not_null
      - name: clause_type
        description: Standardised clause category label (e.g. confidentiality_definition, payment_terms, governing_law).
      - name: clause_text
        description: Verbatim text of the clause as extracted from the contract, or a summary if the clause is absent.
      - name: present
        description: Boolean flag — true if the clause was found in the contract, false if it is missing.
      - name: risk_level
        description: Risk level assigned to this clause type — low, medium, or high.
        tests:
          - accepted_values:
              values: ['low', 'medium', 'high']
      - name: risk_weight
        description: "Numeric encoding of risk_level for scoring: 3=high, 2=medium, 1=low."
